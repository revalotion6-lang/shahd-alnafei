<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{--red:#C1272D;--red-dark:#9B1E23;--red-light:rgba(193,39,45,0.07);--red-bord:rgba(193,39,45,0.18);--bg:#FFFFFF;--bg2:#F6F5F3;--text:#1C1C1C;--muted:#888480;--border:#E2E0DC}
html,body{height:100%;background:var(--bg2);color:var(--text);font-family:'Montserrat',sans-serif;-webkit-font-smoothing:antialiased}
body{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:24px;background:radial-gradient(ellipse 70% 50% at 50% -5%,rgba(193,39,45,0.06) 0%,transparent 55%),var(--bg2)}
.card{width:100%;max-width:400px;background:var(--bg);border:1px solid var(--border);border-radius:24px;overflow:hidden;position:relative;box-shadow:0 4px 32px rgba(0,0,0,0.07);animation:fadeUp .8s cubic-bezier(.16,1,.3,1) both}
@keyframes fadeUp{from{opacity:0;transform:translateY(28px)}to{opacity:1;transform:translateY(0)}}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,transparent 0%,var(--red) 35%,var(--red) 65%,transparent 100%)}
.header{padding:44px 36px 30px;text-align:center}
.logo-wrap{width:130px;height:70px;margin:0 auto 22px;display:flex;align-items:center;justify-content:center}
.logo-wrap img{width:100%;height:100%;object-fit:contain}
.name{font-family:'Cormorant Garamond',serif;font-size:34px;font-weight:400;line-height:1.1;color:var(--text);margin-bottom:10px;letter-spacing:0.3px}
.title-wrap{display:inline-flex;align-items:center;gap:8px}
.title-line{width:20px;height:1px;background:var(--red);opacity:.45}
.title{font-size:10px;font-weight:600;letter-spacing:3px;text-transform:uppercase;color:var(--red)}
.divider{height:1px;background:var(--border);margin:0 36px}
.actions{padding:28px 24px 24px;display:flex;flex-direction:column;gap:10px}
.btn{display:flex;align-items:center;gap:14px;padding:15px 18px;border-radius:12px;text-decoration:none;transition:all .22s ease;cursor:pointer;border:1px solid transparent}
.btn-primary{background:var(--red);color:#fff}
.btn-primary:hover{background:var(--red-dark);transform:translateY(-1px);box-shadow:0 8px 24px rgba(193,39,45,.22)}
.btn-secondary{background:var(--bg2);border-color:var(--border);color:var(--text)}
.btn-secondary:hover{background:var(--red-light);border-color:var(--red-bord);transform:translateY(-1px)}
.btn-icon{width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.btn-primary .btn-icon{background:rgba(255,255,255,.18)}
.btn-secondary .btn-icon{background:var(--red-light)}
.btn-icon svg{width:18px;height:18px}
.btn-primary .btn-icon svg{fill:#fff}
.btn-secondary .btn-icon svg{fill:var(--red)}
.btn-text{flex:1}
.btn-label{font-size:10px;font-weight:600;letter-spacing:2.5px;text-transform:uppercase;display:block;margin-bottom:2px}
.btn-primary .btn-label{color:rgba(255,255,255,.72)}
.btn-secondary .btn-label{color:var(--muted)}
.btn-value{font-size:13px;font-weight:400}
.btn-primary .btn-value{color:#fff}
.btn-secondary .btn-value{color:var(--text)}
.btn-arrow{font-size:15px;opacity:.35;color:inherit}
.footer{padding:16px 36px 28px;text-align:center}
.nfc-badge{display:inline-flex;align-items:center;gap:7px;font-size:10px;font-weight:500;letter-spacing:2px;text-transform:uppercase;color:var(--muted)}
.logo-text{margin:0 auto 22px;text-align:center;line-height:1.1}
.logo-en{display:block;font-family:'Cormorant Garamond',serif;font-size:42px;font-weight:300;letter-spacing:8px;color:var(--red);text-transform:lowercase}
.nfc-dot{width:6px;height:6px;border-radius:50%;background:var(--red);opacity:.55;animation:pulse 2s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:.55;transform:scale(1)}50%{opacity:.9;transform:scale(1.35)}}
</style>
</head>
